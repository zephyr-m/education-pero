name: Docker Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'              # не билдим если поменялся только README

jobs:
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # разрешение пушить в ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Логин в GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # автоматический токен, не надо создавать

      # Мета-теги для образа (latest + sha)
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      # Билд и пуш
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      # Уведомление
      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then ICON="🐳"; else ICON="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="${ICON} Docker build ${{ job.status }} — ${{ github.repository }}"
