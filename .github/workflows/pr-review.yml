name: PR Review

on:
  pull_request:
    branches: [main]

jobs:
  review:
    name: 🔎 Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write     # разрешение писать комментарии в PR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee lint_output.txt
        continue-on-error: true

      - name: Tests
        id: test
        run: npm test 2>&1 | tee test_output.txt
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lint = fs.readFileSync('lint_output.txt', 'utf8');
            const test = fs.readFileSync('test_output.txt', 'utf8');

            const lintOk = '${{ steps.lint.outcome }}' === 'success';
            const testOk = '${{ steps.test.outcome }}' === 'success';

            const body = `## 🤖 Автоматический Code Review

            | Проверка | Статус |
            |----------|--------|
            | Lint | ${lintOk ? '✅ Passed' : '❌ Failed'} |
            | Tests | ${testOk ? '✅ Passed' : '❌ Failed'} |

            <details><summary>📋 Lint Output</summary>

            \`\`\`
            ${lint.slice(-2000)}
            \`\`\`
            </details>

            <details><summary>🧪 Test Output</summary>

            \`\`\`
            ${test.slice(-2000)}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if checks failed
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
