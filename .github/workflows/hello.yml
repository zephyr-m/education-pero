name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint              # тесты ПОСЛЕ линтера. Упал линт → тесты не бегут
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  notify:
    name: 📬 Notify
    runs-on: ubuntu-latest
    needs: [lint, test]      # ждёт оба джоба
    if: always()
    steps:
      - run: |
          if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.lint.result }}" = "success" ]; then
            ICON="✅"; STATUS="PASSED"
          else
            ICON="❌"; STATUS="FAILED"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="${ICON} CI ${STATUS} — ${{ github.repository }} (${{ github.event.head_commit.message }})"
