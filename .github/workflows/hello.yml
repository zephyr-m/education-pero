# Имя workflow — видно в табе Actions на GitHub
name: Hello CI

# КОГДА запускать
on:
  push:
    branches: [main]

# ЧТО делать
jobs:
  greet:
    runs-on: ubuntu-latest    # виртуалка GitHub (бесплатно)
    steps:
      - name: Checkout code    # клонирует твой репо внутрь виртуалки
        uses: actions/checkout@v4

      - name: Say hello
        run: echo "🔥 CI работает! Коммит ${{ github.sha }}"

      - name: Show files
        run: ls -la

      - name: Notify Telegram
        if: always()    # отправит даже если предыдущие шаги упали
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="${ICON} *${STATUS}* — \`${{ github.repository }}\`%0AКоммит: \`${{ github.sha }}\`%0AСообщение: ${{ github.event.head_commit.message }}"
